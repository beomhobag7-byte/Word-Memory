services:
  mysql:
    build: ./mysql
    container_name: tutorial_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: tutorial_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: ./web
    container_name: tutorial_web
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mysql

volumes:
  mysql_data: